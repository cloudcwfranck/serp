env:
  COSIGN_EXPERIMENTAL: 1
jobs:
  build-sign-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t $IMAGE:sha-${{ github.sha }} services/orchestrator
      - run: cosign sign --yes $IMAGE:sha-${{ github.sha }}
      - run: syft packages $IMAGE:sha-${{ github.sha }} -o spdx-json > sbom.json
      - run: grype $IMAGE:sha-${{ github.sha }} --fail-on high
